collections:
  Top Unseen Anime Films:
    collection_filtering: user
    smart_filter:
      all:
        unplayed: true
      sort_by: audience_rating.desc
    sort_title: |-
      zzzzz1 - Top Unseen Anime Films
    collection_mode: hide
    visible_library: true
    visible_home: true
    visible_shared: true

  Studio Ghibli:
    plex_search:
      any:
        studio: Studio Ghibli
        director: Hayao Miyazaki
      sort_by: release.asc
    sort_title: |-
      Studio Ghibli
    collection_mode: hide_items
    visible_library: false
    visible_home: false
    visible_shared: false
    url_poster: https://raw.githubusercontent.com/Arial-Z/PMM-Arialz/main/collections/img/animes/Studio_Ghibli.png
    url_background: https://raw.githubusercontent.com/Arial-Z/PMM-Arialz/main/collections/img/animes/Studio_Ghibli_background.jpg

  Shounen:
    smart_filter:
      all:
        genre: Shounen
      sort_by: title.asc
    sort_title: |-
      !0 - Shonen
    collection_mode: hide
    visible_library: false
    visible_home: false
    visible_shared: false
    url_poster: https://raw.githubusercontent.com/Arial-Z/PMM-Arialz/main/collections/img/animes/Shounen.jpg
    url_background: https://raw.githubusercontent.com/Arial-Z/PMM-Arialz/main/collections/img/animes/animes_background.jpg

