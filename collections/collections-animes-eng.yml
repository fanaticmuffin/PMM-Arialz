collections:
  Airing Now:
    smart_filter:
      all:
        label: Airing
      sort_by: title.asc
    sort_title: |-
      !0 - Airing Now
    collection_mode: hide
    visible_library: false
    visible_home: false
    visible_shared: false
    url_background: https://raw.githubusercontent.com/Arial-Z/PMM-Arialz/main/collections/img/animes/animes_background.jpg
    url_poster: https://raw.githubusercontent.com/fanaticmuffin/PMM-Arialz/main/collections/img/animes/animes_airing_now_eng.jpg

  Airing, to Watch:
    collection_filtering: user
    smart_filter:
      all:
        label: Airing
        unplayed_episodes: true
      sort_by: viewed.desc
    sort_title: |-
      !1 - Airing, to Watch
    collection_mode: show_items
    visible_library: true
    visible_home: true
    visible_shared: true
    url_poster: https://raw.githubusercontent.com/fanaticmuffin/PMM-Arialz/main/collections/img/animes/animes_airing_eng.jpg
    url_background: https://raw.githubusercontent.com/Arial-Z/PMM-Arialz/main/collections/img/animes/animes_background.jpg

  Completed, to Watch:
    collection_filtering: user
    smart_filter:
      all:
        label.not: Airing
        unplayed_episodes: true
      sort_by: added.desc
    sort_title: |-
      !2 - Completed, to Watch
    collection_mode: show_items
    visible_library: true
    visible_home: true
    visible_shared: true
    url_poster: https://raw.githubusercontent.com/fanaticmuffin/PMM-Arialz/main/collections/img/animes/animes_ended_eng.jpg
    url_background: https://raw.githubusercontent.com/Arial-Z/PMM-Arialz/main/collections/img/animes/animes_background.jpg